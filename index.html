<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Download Dokumen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#1e3a8a);
    overflow:hidden;
    padding:20px;
}

/* Efek blur background */

body::before,
body::after{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    border-radius:50%;
    background:rgba(255,255,255,0.1);
    filter:blur(25px);
}

body::before{
    top:-100px;
    left:-100px;
}

body::after{
    bottom:-100px;
    right:-100px;
}

.card{
    position:relative;
    width:100%;
    max-width:420px;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.2);

    border-radius:28px;

    padding:40px 30px;

    text-align:center;

    color:white;

    box-shadow:
    0 8px 32px rgba(0,0,0,0.2);
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    background:white;

    display:flex;
    justify-content:center;
    align-items:center;

    margin:auto;
    margin-bottom:25px;

    font-size:40px;
    color:#2563eb;

    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
    font-size:28px;
    margin-bottom:10px;
}

.subtitle{
    font-size:14px;
    line-height:1.8;
    opacity:0.9;
    margin-bottom:30px;
}

.info-box{
    background:rgba(255,255,255,0.12);
    padding:15px;
    border-radius:15px;
    margin-bottom:25px;
    font-size:13px;
    line-height:1.7;
}

.btn{
    display:block;
    width:100%;
    padding:15px;
    margin-top:15px;

    border-radius:15px;

    text-decoration:none;
    font-size:15px;
    font-weight:600;

    transition:0.3s ease;
}

.survey{
    background:white;
    color:#2563eb;
}

.survey:hover{
    transform:translateY(-3px);
    background:#f3f4f6;
}

.download{
    background:rgba(255,255,255,0.2);
    color:white;
    pointer-events:none;
    cursor:not-allowed;
}

.footer{
    margin-top:30px;
    font-size:12px;
    opacity:0.7;
}

</style>
</head>

<body>

<div class="card">

    <div class="logo">
        ↓
    </div>

    <h1>Download Dokumen</h1>

    <p class="subtitle">
        Silakan isi Survei Indeks Kepuasan Masyarakat (IKM)
        terlebih dahulu sebelum mendownload file.
    </p>

    <div class="info-box">
        Setelah menekan tombol survei,
        tombol download akan otomatis aktif.
    </div>

    <!-- Tombol Survey -->
    <a class="btn survey"
       href="https://forms.gle/pr54tY111Kv6Wrf1A"
       target="_blank"
       onclick="aktifkanDownload()">

       Isi Survei IKM

    </a>

    <!-- Tombol Download -->
    <a id="downloadBtn"
       class="btn download"
       href="https://drive.google.com/file/d/1dytBJyT1jmX-TulSkbf1_sPmmMsDWFsC/view?usp=sharing"
       target="_blank">

       Download File

    </a>

    <div class="footer">
        © 2026 Layanan Dokumen Digital
    </div>

</div>

<script>

function aktifkanDownload(){

    let btn = document.getElementById("downloadBtn");

    btn.style.pointerEvents = "auto";
    btn.style.cursor = "pointer";
    btn.style.background = "#16a34a";

}

</script>

</body>
</html>
